version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dis_user
      POSTGRES_PASSWORD: dis_password
      POSTGRES_DB: digital_identity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dis_user -d digital_identity"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: dis_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    container_name: dis_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/dis_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
